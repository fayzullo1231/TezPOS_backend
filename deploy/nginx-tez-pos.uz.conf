# /etc/nginx/sites-available/tez-pos.uz
# Contabo: Django gunicorn 127.0.0.1:8000 oldida HTTPS reverse proxy
#
# DNS: tez-pos.uz A → Contabo server IP (hozir 13.140.146.78)
# O'rnatish: sudo bash deploy/setup-https-tez-pos.sh

server {
    listen 80;
    listen [::]:80;
    server_name tez-pos.uz www.tez-pos.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tez-pos.uz www.tez-pos.uz;

    ssl_certificate     /etc/letsencrypt/live/tez-pos.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tez-pos.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location /media/ {
        alias /opt/tezpos-backend/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
